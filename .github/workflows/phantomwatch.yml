name: PhantomWatch Coverage Check

on:
  push:
    paths:
      - 'detections/**'
      - 'sigma_rules/**'
      - '.github/workflows/phantomwatch.yml'
  pull_request:
    paths:
      - 'detections/**'

jobs:
  phantomwatch:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PhantomWatch Campaign
        id: campaign
        run: |
          python -c "
import sys
from core.campaign import Campaign
from core.coverage_matrix import CoverageMatrix

c = Campaign('apt-macos')
c.run()

matrix = CoverageMatrix()
matrix.build(c.validated)

simulated = [r for r in c.validated if r.status == 'simulated']
detected  = [r for r in simulated if getattr(r, 'detected', False)]
coverage  = round(len(detected) / len(simulated) * 100, 1) if simulated else 0

print(f'COVERAGE={coverage}')
print(f'DETECTED={len(detected)}')
print(f'GAPS={len(simulated) - len(detected)}')
print(f'SIGMA_RULES={len(c.sigma_rules)}')
" | tee coverage.txt
          
          # Extract values
          COVERAGE=$(grep COVERAGE coverage.txt | cut -d= -f2)
          DETECTED=$(grep DETECTED coverage.txt | cut -d= -f2)
          GAPS=$(grep GAPS coverage.txt | cut -d= -f2)
          SIGMA=$(grep SIGMA_RULES coverage.txt | cut -d= -f2)
          
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "detected=$DETECTED" >> $GITHUB_OUTPUT
          echo "gaps=$GAPS" >> $GITHUB_OUTPUT
          echo "sigma=$SIGMA" >> $GITHUB_OUTPUT

      - name: Check Coverage Threshold
        run: |
          COVERAGE=${{ steps.campaign.outputs.coverage }}
          MIN_COVERAGE=5.0
          
          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below minimum $MIN_COVERAGE%"
            exit 1
          else
            echo "✓ Coverage $COVERAGE% meets threshold"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.campaign.outputs.coverage }}';
            const detected = '${{ steps.campaign.outputs.detected }}';
            const gaps = '${{ steps.campaign.outputs.gaps }}';
            const sigma = '${{ steps.campaign.outputs.sigma }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
## 👻 PhantomWatch Coverage Report

| Metric | Value |
|--------|-------|
| Coverage | ${coverage}% |
| Detected | ${detected} |
| Gaps | ${gaps} |
| Sigma Rules | ${sigma} |

✓ Build passed coverage threshold (minimum 5%)
              `
            });

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: phantomwatch-reports
          path: |
            reports/
            sigma_rules/

  security:
    runs-on: ubuntu-latest
    needs: phantomwatch
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Lint Detection Rules
        run: |
          echo "✓ Detection rule format validation"
          python3 -c "
import json
import sys
from pathlib import Path

failed = 0
for f in Path('detections').glob('*.json'):
    try:
        json.load(open(f))
    except:
        print(f'❌ Invalid JSON: {f}')
        failed += 1

sys.exit(failed)
          "

      - name: Validate Sigma Rules
        run: |
          echo "✓ Sigma rule validation"
          python3 -c "
import yaml
import sys
from pathlib import Path

failed = 0
for f in Path('sigma_rules').glob('*.yml'):
    try:
        yaml.safe_load(open(f))
    except:
        print(f'❌ Invalid YAML: {f}')
        failed += 1

sys.exit(failed)
          "
